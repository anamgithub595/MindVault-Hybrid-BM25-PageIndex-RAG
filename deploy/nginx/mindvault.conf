# ═══════════════════════════════════════════════════════════════════════
#  MindVault — Nginx Virtual Host
#  Handles SSL termination, rate limiting, and proxy to FastAPI
#
#  For local dev (no SSL), use the HTTP-only block.
#  For production, replace YOUR_DOMAIN and point certs correctly.
# ═══════════════════════════════════════════════════════════════════════

upstream mindvault_backend {
    server app:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow health checks over HTTP (for load balancer probes)
    location /health {
        proxy_pass http://mindvault_backend;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL ───────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Query endpoint ────────────────────────────────────────────────
    location /query {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://mindvault_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Ingest endpoint (stricter rate limit, larger body) ────────────
    location /ingest {
        limit_req zone=ingest burst=5 nodelay;
        client_max_body_size 60M;
        proxy_pass         http://mindvault_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 300s;   # ingestion can take time
        proxy_send_timeout 300s;
    }

    # ── All other routes ──────────────────────────────────────────────
    location / {
        proxy_pass         http://mindvault_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
    }

    # ── Block sensitive paths ─────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
