# ═══════════════════════════════════════════════════════════════════════
#  MindVault — Kubernetes Secret
#
#  IMPORTANT: Never commit real values here.
#  Use 'kubectl create secret' or a secrets manager (Vault, AWS SSM, etc.)
#
#  To create manually:
#    kubectl create secret generic mindvault-secrets -n mindvault \
#      --from-literal=PAGEINDEX_API_KEY=pi-your-key \
#      --from-literal=ANTHROPIC_API_KEY=sk-ant-your-key \
#      --from-literal=SECRET_KEY=$(openssl rand -hex 32)
#
#  Values below are base64-encoded placeholders.
# ═══════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: mindvault-secrets
  namespace: mindvault
  labels:
    app.kubernetes.io/name: mindvault
type: Opaque
data:
  # echo -n "your-value" | base64
  PAGEINDEX_API_KEY: cGktcmVwbGFjZS1tZQ==         # pi-replace-me
  ANTHROPIC_API_KEY: c2stYW50LXJlcGxhY2UtbWU=     # sk-ant-replace-me
  OPENAI_API_KEY: c2stcmVwbGFjZS1tZQ==             # sk-replace-me
  SECRET_KEY: Y2hhbmdlLW1lLXRvLWEtbG9uZy1yYW5kb20tc3RyaW5n
  NOTION_TOKEN: c2VjcmV0X3JlcGxhY2VtZQ==
