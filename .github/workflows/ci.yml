# ═══════════════════════════════════════════════════════════════════════
#  MindVault — GitHub Actions CI Pipeline
#
#  Triggers: push to any branch, PR to main
#  Jobs:
#    lint     → ruff + black check
#    test     → pytest (unit tests, mocked external APIs)
#    build    → docker build + image scan
#    push     → push image to GHCR (main branch only)
# ═══════════════════════════════════════════════════════════════════════
name: CI
 
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mindvault
 
jobs:
 
  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Install lint tools
        run: pip install ruff black
 
      - name: Run ruff
        run: ruff check app/ tests/ scripts/
 
      - name: Run black (check only)
        run: black --check app/ tests/ scripts/
 
  # ── Unit Tests ──────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-mock
 
      - name: Run unit tests
        env:
          PAGEINDEX_API_KEY: pi-test-key
          ANTHROPIC_API_KEY: sk-ant-test-key
          GEMINI_API_KEY: AIza-test-key
          LLM_PROVIDER: gemini
          LLM_MODEL: gemini-2.5-flash
          DATABASE_URL: sqlite+aiosqlite:////tmp/mindvault_test.db
          APP_ENV: test
        run: |
          python scripts/init_db.py
          pytest tests/unit/ -v --tb=short \
            --junit-xml=test-results/junit.xml
 
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
 
  # ── Docker Build ────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
        continue-on-error: true   # don't block on scan failures in dev
 
  # ── Push to GHCR (main branch only) ─────────────────────────────────
  push:
    name: Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
 
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 