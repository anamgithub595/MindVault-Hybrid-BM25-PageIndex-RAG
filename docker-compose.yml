# ═══════════════════════════════════════════════════════════════════════
#  MindVault — Production Docker Compose
#
#  Services:
#    app       — FastAPI application (2 workers)
#    nginx     — Reverse proxy + SSL termination
#    postgres  — Optional: swap SQLite for PostgreSQL at scale
#    redis     — Optional: rate-limiting / caching layer
#
#  Usage:
#    docker compose up -d
#    docker compose logs -f app
#    docker compose down -v
# ═══════════════════════════════════════════════════════════════════════
version: "3.9"

services:

  # ── Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: mindvault:latest
    container_name: mindvault_app
    restart: unless-stopped
    env_file:
      - config/.env
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite+aiosqlite:////app/data/mindvault.db
    volumes:
      - mindvault_data:/app/data
      - mindvault_logs:/app/logs
    ports:
      - "8000:8000"        # expose directly (or only via nginx)
    networks:
      - mindvault_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mindvault_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/mindvault.conf:/etc/nginx/conf.d/default.conf:ro
      - mindvault_certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mindvault_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ──────────────────────────────────────────────────────────────
volumes:
  mindvault_data:
    driver: local
  mindvault_logs:
    driver: local
  mindvault_certs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  mindvault_net:
    driver: bridge
