# ═══════════════════════════════════════════════════════════════════════
#  MindVault — Logging Configuration
#  Loaded by app/core/logging_setup.py
#
#  Development: human-readable console output
#  Production:  JSON lines (structured, parsed by log aggregators)
# ═══════════════════════════════════════════════════════════════════════
version: 1
disable_existing_loggers: false

formatters:
  console:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

  json:
    (): "pythonjsonlogger.jsonlogger.JsonFormatter"
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%SZ"

handlers:
  console:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: console
    level: DEBUG

  file:
    class: logging.handlers.RotatingFileHandler
    filename: logs/mindvault.log
    maxBytes: 52428800   # 50 MB
    backupCount: 5
    formatter: json
    level: INFO

loggers:
  mindvault:
    level: INFO
    handlers: [console, file]
    propagate: false

  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  uvicorn.error:
    level: ERROR
    handlers: [console]
    propagate: false

  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: false

  sqlalchemy.engine:
    level: WARNING
    handlers: [console]
    propagate: false

  httpx:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
